<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>>Registration Form</title>
</head>
<body>
      <h1>Registration Form</h1>

    <form action="#" method="POST">

        <label "firstName">First Name: *</label>
        <input type="text" id="firstName" name="firstName" required>
        <br><br>
        <label "lastName">Last Name: *</label>
        <input type="text" id="lastName" name="lastName" required>
        <br><br>
        <label "email">Email Address: *</label>
        <input type="text" id="email" name="email" required>
        <br><br>
        <label "password">Password:</label>
        <input type="password" id="password" name="password">
        <br><br>
        <label "confirmPassword">Confirm Password:</label>
        <input type="password" id="confirmPassword" name="confirmPassword">
        <br><br>
        <label "birthday">Birthday:</label>
        <input type="date" id="birthday" name="birthday">
        <br><br>
        
        <p>Gender Identity</p>

        <input type="radio" id="male" name="gender" value="male">
        <label "male">Male</label>

        <input type="radio" id="female" name="gender" value="female">
        <label "female">Female</label>

        <input type="radio" id="nonbinary" name="gender" value="nonbinary">
        <label "nonbinary">Non-binary</label>

        <input type="radio" id="nopreference" name="gender" value="no_preference">
        <label "nopreference">I prefer not to answer</label>
        <br><br>

        <label "description">A short description about myself:</label>
        <br>
        <textarea id="description" name="description" rows="4" cols="40"></textarea>
        <br><br>

        <label "language">Favorite Language:</label>
        <select id="language" name="language">
            <option value="javascript">JavaScript</option>
            <option value="python">Python</option>
            <option value="java">Java</option>
            <option value="csharp">C#</option>
        </select>
        <br><br>

        <input type="checkbox" id="updates" name="updates">
        <label "updates">Yes, I would like to receive periodic email updates</label>
        <br><br>

        <input type="submit" value="Create Account">

        <p>* Indicates a required field</p>

    </form>
</body>
</html>
