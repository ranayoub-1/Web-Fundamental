<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Programmer Portfolio</title>
    <meta name="description" content="Personal portfolio of a programmer showcasing skills, projects, and contact information.">
</head>

<body>

    <h1>Programmer Name</h1>
    <div>
        <img src="profile-placeholder.png" alt="Profile Picture" width="120">

        <p>
            <a href="#">My GitHub</a> |
            <a href="#">My LinkedIn</a> |
            <a href="mailto:youremail@example.com">My Email</a>
        </p>
    </div>

    <div>
        <h2>Technologies</h2>
        <table>
            <tr>
                <th>Front-End</th>
                <th>Python</th>
                <th>JavaScript</th>
                <th>Database</th>
                <th>Concepts</th>
            </tr>
            <tr>
                <td>HTML5</td>
                <td>Django</td>
                <td>Express</td>
                <td>MySQL</td>
                <td>AJAX</td>
            </tr>
            <tr>
                <td>CSS3</td>
                <td>Flask</td>
                <td>MongoDB</td>
                <td>PostgreSQL</td>
                <td>OOP</td>
            </tr>
            <tr>
                <td>Bootstrap</td>
                <td>UnitTest</td>
                <td>React</td>
                <td>SQLite</td>
                <td>REST</td>
            </tr>
        </table>
    </div>

    <div>
        <h2>Social Snakes</h2>

        <p> Social Media App made in Python - <a href="#">code</a> | <a href="#">deployed</a> </p>
    </div>

    <div>
        <h2>Contact Me</h2>
        <form>
            <label for="name">Name:</label>
            <input type="text" id="name" name="name">

            <label for="email">Email:</label>
            <input type="text" id="email" name="email">
            <br>
            <label for="message">Message:</label>
            <br>
            <textarea id="message" name="message" rows="5" cols="40"></textarea>
            <br>

            <input type="submit" value="Send Message">
        </form>
        
    </div>

</body>
</html>
