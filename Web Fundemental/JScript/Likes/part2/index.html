<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Likes</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Top Bar -->
<div class="top-bar">
    <h2>Network</h2>
</div>

<div class="container">

    <!-- Sidebar -->
    <div class="sidebar">
        <img src="user.png" class="avatar" alt="user">
        <p><a href="#">Add an avatar</a></p>
        <h3>James Doe</h3>
    </div>

    <!-- Feed -->
    <div class="feed">
        <h2>Your Feed</h2>

        <!-- Post 1 -->
        <div class="post">
            <div class="post-header">
                <strong>Neil M</strong>
                <div>
                    <span id="like1">9</span> like(s)
                    <button onclick="like1()">Like</button>
                </div>
            </div>
            <p>I just set up this new discord bot, let me know what you all think. <a href="#">link</a></p>
        </div>

        <!-- Post 2 -->
        <div class="post">
            <div class="post-header">
                <strong>Nichole K</strong>
                <div>
                    <span id="like2">12</span> like(s)
                    <button onclick="like2()">Like</button>
                </div>
            </div>
            <p>Just finished my <a href="#">next comic</a>, check it out.</p>
        </div>

        <!-- Post 3 -->
        <div class="post">
            <div class="post-header">
                <strong>Jim R</strong>
                <div>
                    <span id="like3">9</span> like(s)
                    <button onclick="like3()">Like</button>
                </div>
            </div>
            <p>I can't stop listening to the <a href="#">new album</a>. Who else is liking it?</p>
        </div>

    </div>

</div>

<script src="script.js"></script>
</body>
</html>
