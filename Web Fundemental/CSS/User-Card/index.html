<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Profile</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="header"></div>

    <div class="profile-body">

        <img src="icons/user-circle.png" class="avatar" alt="profile">

    </div>

</div>

</html>
